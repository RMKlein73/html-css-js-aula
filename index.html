<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="stylesheet" href="css/style.css">
    <meta charset="UTF-8">
    <title>forms-example</title>
</head>
<body style="background-color: darkslategray;">
    <form action="Pages/resultado.html">
        <h1 id="titulo_form" onclick="mudar_texto()" onmousemove="mudar_cor()" onmouseout="restaurar_cor()">CADASTRO</h1>
        <label for="nome">Nome</label>
        <input type="text" id="nome" placeholder="Seu nome" required> <br> <br>
        <label for="email">E-mail</label>  
        <input type="email" id="email" placeholder="Digite seu email" required> <br> <br>
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Insira sua senha" required> <br> <br>
        <label for="pais">País</label>
        <input type="text" id="pais" placeholder="Qual país"> <br> <br>
        <label for="jogador_favorito">Jogador Favorito</label>
        <input type="text" id="jogador_favorito" placeholder="Ex: Neymar, Messi..."> <br> <br>
        <label for="data_nascimento">Data de Nascimento</label>
        <input type="date" id="data_nascimento"> <br> <br>
        <input type="button" id="btnEnviar" value="Enviar">
    </form>
    <script src="js/script.js"></script>
</body>
</html>
